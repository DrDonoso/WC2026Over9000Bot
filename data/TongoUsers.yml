# =============================================================================
# TongoUsers.yml — configuració per persona del comando /tongo
# =============================================================================
#
# ESQUEMA (totes les claus són opcionals):
#
#   nomdusuari:                    # Telegram @username en minúscules (sense @)
#     sanchez_ratio: 0.0           # Probabilitat de "Sanchez ens roba" per a
#                                  # aquest usuari. Valor entre 0 (mai) i 1
#                                  # (sempre). Per defecte: 1/3 global.
#     phrases_mode: append         # "append" (per defecte): afegeix frases
#                                  # pròpies al pool global.
#                                  # "replace": substitueix completament el pool
#                                  # global. Si mode=replace i no hi ha frases,
#                                  # cau al pool global (mai pool buit).
#     phrases:                     # Frases pròpies inline (suporta vars {{...}})
#       - "Frase personalitzada, {{first_name}}"
#     phrases_file: tongo/nom.txt  # Fitxer de frases addicionals (ruta relativa
#                                  # al directori d'aquest YAML)
#
# VARIABLES DE PLANTILLA DISPONIBLES:
#   Emissor: {{first_name}} {{last_name}} {{full_name}} {{username}} {{id}}
#   Destinatari (quan es respon a un missatge):
#     {{reply_to_first_name}} {{reply_to_last_name}} {{reply_to_full_name}}
#     {{reply_to_username}} {{reply_to_id}}
#
# HOT-RELOAD: el bot rellegeix aquest fitxer a cada /tongo (caché per mtime).
# ENV OVERRIDE: TONGO_USERS_PATH per canviar la ruta del fitxer.
# COMPATIBILITAT: un usuari sense entrada manté el comportament original
#   (1/3 Sanchez, pool global) — cap canvi fins que s'activi una entrada.
#
# =============================================================================
# EXEMPLES COMENTATS (descomenta i ajusta per activar):
#
# drdonoso:
#   sanchez_ratio: 0.66            # 2/3 de probabilitat de "Sanchez ens roba"
#
# raona:
#   sanchez_ratio: 0.0             # Mai "Sanchez ens roba" per a raona
#   phrases_mode: replace          # Substitueix el pool global amb les frases
#   phrases:
#     - "Raona, {{first_name}}, mira qui parla de tongo!"
#   phrases_file: tongo/raona.txt  # Frases addicionals des de fitxer extern
#
# alice:
#   phrases:
#     - "Ei {{first_name}}, la teva porra és un desastre."
#     - "Menos tongo, más predicciones, {{first_name}}."
# =============================================================================
