  #   phrases_mode: append         # añade las frases propias al pool global
  #   phrases:
  #     - "{{first_name}}, menos tongo y más puntuar."
  #     - "{{first_name}} (@{{username}}), reclamación nº 7.000 desestimada."

  # otro_usuario:
  #   sanchez_ratio: 0.0           # nunca "Sanchez ens roba" para este usuario
  #   phrases_mode: replace        # sustituye el pool global con sus frases propias
