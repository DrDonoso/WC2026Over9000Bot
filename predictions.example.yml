# predictions.example.yml — World Cup 2026 Porra — TEMPLATE
#
# PURPOSE: Copy this file to data/predictions.yml and fill in real participants.
#          This committed file seeds local runs; data/predictions.yml is
#          mounted into the container (editable live, hot-reloaded).
#
# FORMAT:
#   - Top-level key: Telegram @username (without @), lowercase.
#   - groups: each group (A–L) lists exactly 3 TLA codes: [1st, 2nd, 3rd].
#   - knockout: each stage lists the teams you predict will ADVANCE from it.
#       round_of_32   → 16 teams advancing to Round of 16
#       round_of_16   → 8 teams advancing to Quarter-finals
#       quarter_finals → 4 teams advancing to Semi-finals
#       semi_finals    → 2 teams advancing to the Final
#       final          → 1 team (the champion)
#   - Use "**" as a wildcard/no-pick (always scores 0, never errors).
#   - TLA codes MUST match football-data.org exactly (e.g. KSA not SAU,
#     URY not URU).  Wrong codes silently score 0.
#   - base_score: optional manual point adjustment (default 0).
#   - display_name: optional display name shown in rankings.
#
# REAL WC2026 GROUPS (football-data.org standings order, 2026-06-15):
#   A: MEX KOR CZE RSA     B: SUI CAN QAT BIH
#   C: SCO MAR BRA HAI     D: USA AUS TUR PAR
#   E: GER CIV ECU CUW     F: SWE JPN NED TUN
#   G: EGY BEL IRN NZL     H: CPV KSA ESP URY
#   I: FRA IRQ NOR SEN     J: ALG ARG JOR AUT
#   K: COD COL POR UZB     L: ENG GHA CRO PAN

