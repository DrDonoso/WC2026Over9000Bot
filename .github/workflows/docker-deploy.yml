name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.squad/**'
      - 'CHANGELOG.md'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Compute CalVer version
      id: calver
      run: |
        TODAY=$(date -u +%Y%m%d)
        git fetch --tags

        # Find existing tags for today
        EXISTING=$(git tag -l "${TODAY}" "${TODAY}.*" | sort -V)

        if [ -z "$EXISTING" ]; then
          # No tags for today — first push
          VERSION="$TODAY"
        else
          # Find the highest suffix
          LAST=$(echo "$EXISTING" | tail -n1)
          if [ "$LAST" = "$TODAY" ]; then
            # Base tag exists with no suffix, next is .02
            VERSION="${TODAY}.02"
          else
            # Extract numeric suffix and increment
            SUFFIX=$(echo "$LAST" | sed "s/${TODAY}\.//")
            NEXT=$(printf "%02d" $((10#$SUFFIX + 1)))
            VERSION="${TODAY}.${NEXT}"
          fi
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Computed version: $VERSION"

    - name: Generate release notes from commits
      id: releasenotes
      run: |
        python3 - <<'PYEOF' > release_notes.md
        import subprocess
        def git(*args):
            r = subprocess.run(['git'] + list(args), capture_output=True, text=True)
            return r.stdout.strip()
        prev = git('describe', '--tags', '--abbrev=0')
        rng = f"{prev}..HEAD" if prev else "HEAD"
        shas_out = git('log', rng, '--no-merges', '--format=%H')
        shas = [s.strip() for s in shas_out.splitlines() if s.strip()]
        SKIP = ('.squad:', 'chore:', 'docs: update changelog', 'merge ')
        bullets = []
        for sha in shas:
            msg = git('log', '-1', '--format=%B', sha)
            lines = msg.splitlines()
            if not lines:
                continue
            subject = lines[0]
            if any(subject.strip().lower().startswith(p) for p in SKIP):
                continue
            body = lines[1:]
            commit_bullets = []
            current = None
            for line in body:
                if line.strip().lower().startswith('co-authored-by:'):
                    break
                if current is not None and len(line) >= 2 and line[0] == ' ' and line[1] == ' ':
                    part = line.strip()
                    if part:
                        current += ' ' + part
                    continue
                stripped = line.lstrip(' ')
                if stripped.startswith('- '):
                    if current is not None:
                        commit_bullets.append(current)
                    current = '- ' + stripped[2:]
                    continue
                if current is not None:
                    commit_bullets.append(current)
                    current = None
            if current is not None:
                commit_bullets.append(current)
            if commit_bullets:
                bullets.extend(commit_bullets)
            else:
                bullets.append(f"- {subject}")
        print('\n'.join(bullets))
        PYEOF
        if [ -s release_notes.md ]; then
          echo "has_notes=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_notes=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: |
          drdonoso/worldcup2026:latest
          drdonoso/worldcup2026:${{ steps.calver.outputs.version }}

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
        HAS_NOTES: ${{ steps.releasenotes.outputs.has_notes }}
        VERSION: ${{ steps.calver.outputs.version }}
      run: |
        if [ "$HAS_NOTES" = "true" ]; then
          gh release create "$VERSION" --title "$VERSION" --notes-file release_notes.md
        else
          gh release create "$VERSION" --title "$VERSION" --generate-notes
        fi

    - name: Update CHANGELOG.md
      if: steps.releasenotes.outputs.has_notes == 'true'
      env:
        VERSION: ${{ steps.calver.outputs.version }}
      run: |
        DATE=$(date -u +%Y-%m-%d)

        {
          echo ""
          echo "## [$VERSION] - $DATE"
          echo ""
          cat release_notes.md
          echo ""
        } > new_entry.md

        sed -i "/<!-- releases -->/r new_entry.md" CHANGELOG.md
        rm new_entry.md

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add CHANGELOG.md
        git commit -m "docs: update changelog for $VERSION [skip ci]"

        if ! git push origin HEAD:main; then
          git pull --rebase --autostash origin main
          if ! git push origin HEAD:main; then
            echo "Warning: changelog push failed after rebase; will catch up next release"
            exit 0
          fi
        fi
