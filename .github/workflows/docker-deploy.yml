name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.squad/**'
      - 'CHANGELOG.md'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Compute CalVer version
      id: calver
      run: |
        TODAY=$(date -u +%Y%m%d)
        git fetch --tags

        # Find existing tags for today
        EXISTING=$(git tag -l "${TODAY}" "${TODAY}.*" | sort -V)

        if [ -z "$EXISTING" ]; then
          # No tags for today — first push
          VERSION="$TODAY"
        else
          # Find the highest suffix
          LAST=$(echo "$EXISTING" | tail -n1)
          if [ "$LAST" = "$TODAY" ]; then
            # Base tag exists with no suffix, next is .02
            VERSION="${TODAY}.02"
          else
            # Extract numeric suffix and increment
            SUFFIX=$(echo "$LAST" | sed "s/${TODAY}\.//")
            NEXT=$(printf "%02d" $((10#$SUFFIX + 1)))
            VERSION="${TODAY}.${NEXT}"
          fi
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Computed version: $VERSION"

    - name: Generate release notes from commits
      id: releasenotes
      run: |
        PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)

        if [ -n "$PREV_TAG" ]; then
          RANGE="$PREV_TAG..HEAD"
        else
          RANGE="HEAD"
        fi

        {
          git log "$RANGE" --no-merges --pretty=format:'%s' \
            | grep -v -i '^\.squad:' \
            | grep -v -i '^docs: update changelog' \
            | grep -v -i '^Merge ' \
            | grep -v -i '^chore:' \
            | sed -E 's/^(feat|fix|perf|refactor|docs)(\([^)]+\))?: //' \
            | sed 's/^/- /'
        } > release_notes.md || true

        if [ -s release_notes.md ]; then
          echo "has_notes=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_notes=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          drdonoso/worldcup2026:latest
          drdonoso/worldcup2026:${{ steps.calver.outputs.version }}

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
        HAS_NOTES: ${{ steps.releasenotes.outputs.has_notes }}
        VERSION: ${{ steps.calver.outputs.version }}
      run: |
        if [ "$HAS_NOTES" = "true" ]; then
          gh release create "$VERSION" --title "$VERSION" --notes-file release_notes.md
        else
          gh release create "$VERSION" --title "$VERSION" --generate-notes
        fi

    - name: Update CHANGELOG.md
      if: steps.releasenotes.outputs.has_notes == 'true'
      env:
        VERSION: ${{ steps.calver.outputs.version }}
      run: |
        DATE=$(date -u +%Y-%m-%d)

        {
          echo ""
          echo "## [$VERSION] - $DATE"
          echo ""
          cat release_notes.md
          echo ""
        } > new_entry.md

        sed -i "/<!-- releases -->/r new_entry.md" CHANGELOG.md
        rm new_entry.md

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add CHANGELOG.md
        git commit -m "docs: update changelog for $VERSION [skip ci]"

        if ! git push origin HEAD:main; then
          git pull --rebase --autostash origin main
          if ! git push origin HEAD:main; then
            echo "Warning: changelog push failed after rebase; will catch up next release"
            exit 0
          fi
        fi
