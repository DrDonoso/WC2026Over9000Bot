name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Compute CalVer version
      id: calver
      run: |
        TODAY=$(date -u +%Y%m%d)
        git fetch --tags

        # Find existing tags for today
        EXISTING=$(git tag -l "${TODAY}" "${TODAY}.*" | sort -V)

        if [ -z "$EXISTING" ]; then
          # No tags for today — first push
          VERSION="$TODAY"
        else
          # Find the highest suffix
          LAST=$(echo "$EXISTING" | tail -n1)
          if [ "$LAST" = "$TODAY" ]; then
            # Base tag exists with no suffix, next is .02
            VERSION="${TODAY}.02"
          else
            # Extract numeric suffix and increment
            SUFFIX=$(echo "$LAST" | sed "s/${TODAY}\.//")
            NEXT=$(printf "%02d" $((10#$SUFFIX + 1)))
            VERSION="${TODAY}.${NEXT}"
          fi
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Computed version: $VERSION"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          drdonoso/worldcup2026:latest
          drdonoso/worldcup2026:${{ steps.calver.outputs.version }}

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "${{ steps.calver.outputs.version }}" \
          --title "${{ steps.calver.outputs.version }}" \
          --generate-notes
