services:
  worldcup-bot:
    image: drdonoso/worldcup2026
    restart: unless-stopped

    environment:
      # --- Telegram Bot (via @BotFather) ---
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"

      # --- football-data.org API ---
      FOOTBALL_DATA_API_KEY: "${FOOTBALL_DATA_API_KEY}"

      # --- Predictions YAML path inside container ---
      PREDICTIONS_PATH: "${PREDICTIONS_PATH:-/app/data/predictions.yml}"

      # --- Competition code (football-data.org) ---
      COMPETITION_CODE: "${COMPETITION_CODE:-WC}"

      # --- Timezone for match time display ---
      TIMEZONE: "${TIMEZONE:-Europe/Madrid}"

      # --- Telegram group/channel ID for live goal notifications (REQUIRED) ---
      TELEGRAM_GROUP_ID: "${TELEGRAM_GROUP_ID}"

    volumes:
      # Mount the host ./data directory; edit ./data/predictions.yml on the host (or server)
      # and the bot picks it up on the next command (hot-reload by mtime). Read-only inside the container.
      - ./data:/app/data:ro
