services:
  worldcup-bot:
    image: drdonoso/worldcup2026
    restart: unless-stopped

    environment:
      # --- Telegram Bot (via @BotFather) ---
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"

      # --- football-data.org API ---
      FOOTBALL_DATA_API_KEY: "${FOOTBALL_DATA_API_KEY}"

      # --- Predictions YAML path inside container ---
      PREDICTIONS_PATH: "${PREDICTIONS_PATH:-/app/data/predictions.yml}"

      # --- Config de /tongo: frases globales + overrides por persona (data/TongoUsers.yml, hot-reload) ---
      TONGO_USERS_PATH: "${TONGO_USERS_PATH:-/app/data/TongoUsers.yml}"

      # --- Competition code (football-data.org) ---
      COMPETITION_CODE: "${COMPETITION_CODE:-WC}"

      # --- Timezone for match time display ---
      TIMEZONE: "${TIMEZONE:-Europe/Madrid}"

      # --- Telegram group/channel ID for live goal notifications (REQUIRED) ---
      TELEGRAM_GROUP_ID: "${TELEGRAM_GROUP_ID}"

      # --- OpenAI-compatible AI (self-hosted LiteLLM) for the daily update ---
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
      DAILY_UPDATE_HOUR: "${DAILY_UPDATE_HOUR:-9}"

      # --- Group chat features (picante random replies + revive inactive users) ---
      # Requires OPENAI_* vars fully set + Telegram privacy mode DISABLED.
      CHAT_PICANTE_ENABLED: "${CHAT_PICANTE_ENABLED:-0}"
      CHAT_REVIVE_ENABLED: "${CHAT_REVIVE_ENABLED:-0}"
      CHAT_BUFFER_SIZE: "${CHAT_BUFFER_SIZE:-30}"
      PICANTE_PROBABILITY: "${PICANTE_PROBABILITY:-0.20}"
      PICANTE_COOLDOWN_SECONDS: "${PICANTE_COOLDOWN_SECONDS:-300}"
      PICANTE_MAX_PER_DAY: "${PICANTE_MAX_PER_DAY:-30}"
      PICANTE_MIN_BUFFER: "${PICANTE_MIN_BUFFER:-5}"
      PICANTE_TEMPERATURE: "${PICANTE_TEMPERATURE:-0.9}"
      REVIVE_CHECK_INTERVAL_SECONDS: "${REVIVE_CHECK_INTERVAL_SECONDS:-14400}"
      REVIVE_INACTIVE_DAYS: "${REVIVE_INACTIVE_DAYS:-3}"
      REVIVE_MENTION_COOLDOWN_DAYS: "${REVIVE_MENTION_COOLDOWN_DAYS:-2}"
      REVIVE_TEMPERATURE: "${REVIVE_TEMPERATURE:-0.8}"

      # --- Daily 'rich' image evolution (gpt-image-2 via LiteLLM) ---
      OPENAI_IMAGE_MODEL: "${OPENAI_IMAGE_MODEL:-gpt-image-2}"
      OPENAI_IMAGE_API_KEY: "${OPENAI_IMAGE_API_KEY:-}"
      OPENAI_IMAGE_BASE_URL: "${OPENAI_IMAGE_BASE_URL:-}"
      RICH_IMAGE_HOUR: "${RICH_IMAGE_HOUR:-0}"

      # --- Selecciones 'favoritas' (❤️ junto a la bandera) — TLAs separadas por comas ---
      BELOVED_TEAMS: "${BELOVED_TEAMS:-PAN,UZB,CUW}"

      # --- Marca con 📺 los partidos que da TVE (vía API de RTVE). "0" para desactivar. ---
      TVE_ENABLED: "${TVE_ENABLED:-1}"

      # --- Persistent state directory for porra snapshot ---
      STATE_DIR: /app/state

    volumes:
      # Mount the host ./data directory; edit ./data/predictions.yml on the host (or server)
      # and the bot picks it up on the next command (hot-reload by mtime). Read-only inside the container.
      - ./data:/app/data:ro
      # Named volume for persistent state (porra snapshot) across container restarts
      - bot_state:/app/state

volumes:
  bot_state:
